<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Station Override Terminal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <!-- Game Header / Stats Bar -->
        <div id="game-header">
            <div class="header-logo">
                <span class="logo-emoji">🚀</span>
                <span class="logo-title">AETHER ACADEMY</span>
            </div>
            <div class="stats-container">
                <div class="stat-badge badge-level">
                    <span class="badge-icon">⭐</span>
                    <span>LEVEL 1: PYTHON CADET</span>
                </div>
                <div class="stat-badge badge-streak">
                    <span class="badge-icon">🔥</span>
                    <span>STREAK: 1 DAY</span>
                </div>
                <div class="stat-badge badge-energy">
                    <span class="badge-icon">🔋</span>
                    <span>ENERGY: 100%</span>
                </div>
            </div>
        </div>

        <div id="main-bento-grid">
            <!-- Panel 1: Narrative & Instructions -->
            <div id="narrative-panel" class="panel">
                <div class="panel-header">
                    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <span>ΑΠΟΣΤΟΛΗ (MISSION)</span>
                </div>
                <div id="narrative-content">
                    <h1>Initializing...</h1>
                    <p>Awaiting data from data cores...</p>
                </div>
            </div>

            <!-- Panel 2: Code Editor (Monaco) -->
            <div id="editor-panel" class="panel">
                <div class="panel-header">
                    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"></polyline>
                        <line x1="12" y1="19" x2="20" y2="19"></line>
                    </svg>
                    <span>ΚΟΝΣΟΛΑ ΕΠΙΣΚΕΥΗΣ (REPAIR CONSOLE)</span>
                </div>
                <div id="monaco-container"></div>
                <div class="editor-controls">
                    <button id="run-btn">▶ ΕΚΤΕΛΕΣΗ (RUN CODE)</button>
                </div>
            </div>

            <!-- Panel 3: Terminal Output & Pi Agent Chat -->
            <div id="comms-panel" class="panel">
                <div class="panel-header">
                    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="12" cy="5" r="2"></circle>
                        <path d="M12 7v4"></path>
                        <line x1="8" y1="16" x2="8.01" y2="16"></line>
                        <line x1="16" y1="16" x2="16.01" y2="16"></line>
                    </svg>
                    <span>ΒΟΗΘΟΣ PI AGENT (MY AI COMPANION)</span>
                </div>
                
                <div id="terminal-output" class="sub-panel">
                    <div class="sub-panel-header">
                        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-right: 6px; vertical-align: middle;">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                        <span>ΑΠΟΤΕΛΕΣΜΑ (SYSTEM OUTPUT)</span>
                    </div>
                    <pre id="output-content">></pre>
                </div>

                <div id="chat-interface" class="sub-panel">
                    <div class="sub-panel-header">
                        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-right: 6px; vertical-align: middle;">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>ΣΥΖΗΤΗΣΗ ΜΕ PI AGENT</span>
                    </div>
                    <div id="chat-history"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Ρώτησε τον Pi Agent..." />
                        <button id="chat-send">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
